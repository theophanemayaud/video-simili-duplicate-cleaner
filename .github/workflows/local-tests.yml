name: Local Tests

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: local-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-local-tests:
    name: Linux tiny repo-local tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore apt package cache
        uses: actions/cache@v4
        with:
          path: .apt-cache/archives
          key: apt-linux-local-tests-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.github/workflows/local-tests.yml') }}
          restore-keys: |
            apt-linux-local-tests-${{ runner.os }}-${{ runner.arch }}-

      - name: Install dependencies
        run: |
          mkdir -p .apt-cache/archives/partial
          sudo apt-get update
          sudo apt-get -o Dir::Cache::archives="$PWD/.apt-cache/archives" install -y \
            cmake \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libopencv-dev \
            libswresample-dev \
            libswscale-dev \
            ninja-build \
            pkg-config \
            qt6-base-dev \
            qt6-qpa-plugins
          sudo rm -f .apt-cache/archives/lock
          sudo chown -R "$USER" .apt-cache

      - name: Configure
        run: |
          cmake -S QtProject -B QtProject/builds/ci-local-tests -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug

      - name: Build self-contained test targets
        run: |
          cmake --build QtProject/builds/ci-local-tests --target \
            test_comparison \
            test_mainwindow \
            test_auto_delete

      - name: Run self-contained tests
        run: |
          ctest --test-dir QtProject/builds/ci-local-tests \
            --output-on-failure \
            -R "^(test_comparison|test_mainwindow|test_auto_delete)$"

  # We build univeralized static dependencies for macOS directly from latest macOS
  # That we then reuse for all macOS runners
  macos-static-deps:
    name: macOS static dependencies
    runs-on: macos-26
    timeout-minutes: 45 # takes about 25mins
    env:
      HOMEBREW_NO_AUTO_UPDATE: 1
      HOMEBREW_NO_INSTALL_CLEANUP: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache macOS static dependencies
        id: cache-macos-static-deps
        uses: actions/cache@v4
        with:
          path: |
            QtProject/libraries/macos/qt/qt-install
            QtProject/libraries/macos/opencv-arm/opencv-install
            QtProject/libraries/macos/ffmpeg/ffmpeg-universalized-libs
            QtProject/libraries/macos/ffmpeg/libaom-universalized
          key: macos-static-deps-universal-${{ hashFiles('package.json', 'QtProject/libraries/macos/qt/qt.sh', 'QtProject/libraries/macos/opencv-arm/opencv.sh', 'QtProject/libraries/macos/ffmpeg/ffmpeg.sh') }}

      - name: Install macOS build tools
        if: steps.cache-macos-static-deps.outputs.cache-hit != 'true'
        run: |
          brew install cmake ninja nasm pkg-config

      - name: Build macOS static dependencies
        if: steps.cache-macos-static-deps.outputs.cache-hit != 'true'
        run: |
          npm run qt-macos
          npm run ffmpeg-macos
          npm run opencv-macos

      - name: Package macOS static dependencies
        run: |
          tar -czf macos-static-deps.tar.gz \
            QtProject/libraries/macos/qt/qt-install \
            QtProject/libraries/macos/opencv-arm/opencv-install \
            QtProject/libraries/macos/ffmpeg/ffmpeg-universalized-libs \
            QtProject/libraries/macos/ffmpeg/libaom-universalized

      - name: Upload macOS static dependencies
        uses: actions/upload-artifact@v4
        with:
          name: macos-static-deps
          path: macos-static-deps.tar.gz
          retention-days: 1

  macos-local-tests:
    name: macOS local-like tests (${{ matrix.name }})
    needs: macos-static-deps
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS 14 arm64
            runner: macos-14
          - name: macOS 26 arm64
            runner: macos-26
          - name: macOS 15 Intel
            runner: macos-15-intel
          - name: macOS 26 Intel
            runner: macos-26-intel
    env:
      HOMEBREW_NO_AUTO_UPDATE: 1
      HOMEBREW_NO_INSTALL_CLEANUP: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download macOS static dependencies
        uses: actions/download-artifact@v4
        with:
          name: macos-static-deps

      - name: Unpack macOS static dependencies
        run: |
          tar -xzf macos-static-deps.tar.gz

      - name: Install macOS build tools
        run: |
          brew install cmake ninja

      - name: Configure
        run: |
          cmake -S QtProject -B QtProject/builds/ci-macos-local-tests -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_PREFIX_PATH="$PWD/QtProject/libraries/macos/qt/qt-install" \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"

      - name: Build self-contained test targets
        run: |
          cmake --build QtProject/builds/ci-macos-local-tests --target \
            test_comparison \
            test_mainwindow \
            test_auto_delete

      - name: Run self-contained tests
        run: |
          ctest --test-dir QtProject/builds/ci-macos-local-tests \
            --output-on-failure \
            -R "^(test_comparison|test_mainwindow|test_auto_delete)$"
